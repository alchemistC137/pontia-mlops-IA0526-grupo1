name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URL: ${{ secrets.MLFLOW_TRACKING_URL }}
      EXPERIMENT_NAME: ${{ vars.EXPERIMENT_NAME || 'noname-adult-income'}}
      MODEL_NAME: ${{ vars.MODEL_NAME }}

    steps:
      - name: generar variable RUN_NAME
        run: |
          echo "RUN_NAME=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download dataset
        run: |
          mkdir -p data/raw
          curl -o data/raw/adult.data https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data
          curl -o data/raw/adult.test https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test

      - name: entrenar y guardar modelo
        run: |
          python src/main.py

      - name: generar RUN_ID
        run: |
          echo "RUN_ID=$(cat run_id.txt)" >> $GITHUB_ENV

      - name: Run model tests
        run: |
          python model_tests/test_model.py

      - name: Registrar en MLflow
        run: |
          python scripts/register_model.py